<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色属性计算器</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <button class="side-btn" data-modal="level">⚙️<br>等级</button>
      <button class="side-btn" data-modal="passive">📘<br>被动</button>
      <button class="side-btn" data-modal="awake">✨<br>觉醒</button>
      <button class="side-btn" data-modal="badge">🎖️<br>徽章</button>
      <button class="side-btn" data-modal="seal">🔮<br>刻印</button>
      <button class="side-btn" data-modal="deed">📜<br>事迹</button>
    </nav>

    <main id="app">
      <h1>⚔️ 角色属性计算器</h1>

      <div class="section char-display">
        <div class="char-avatar">
          <img id="charImg" src="" alt="角色头像">
        </div>
        <div class="char-info">
          <div class="char-name" id="charName">请选择角色</div>
          <div class="char-detail" id="charDetail"></div>
        </div>
        <button id="changeCharBtn" class="btn-glass">更换角色</button>
      </div>

      <div class="result-section" id="resultPanel">
        <div class="result-header">
          <h2>📊 计算结果</h2>
          <label class="toggle-switch">
            <input type="checkbox" id="showSourceToggle">
            <span class="slider"></span>
            <span class="toggle-label">显示属性来源</span>
          </label>
        </div>
        <div class="attr-grid" id="attrGrid"></div>
        <div id="legend" class="detail-legend" style="display:none;">
          <span class="detail-raw">■ 基础</span>
          <span class="detail-badge-add">■ 徽章</span>
          <span class="detail-seal-add">■ 刻印</span>
          <span class="detail-deed-add">■ 事迹</span>
        </div>
      </div>
    </main>
  </div>

  <!-- 等级配置浮窗 -->
  <div id="modal-level" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>⚙️ 等级配置</h3>
      <div class="controls">
        <div class="control-item">
          <label>突破等级</label>
          <select id="tierSelect">
            <option value="0">突破0 (1~30级)</option>
            <option value="1">突破1 (1~40级)</option>
            <option value="2">突破2 (1~60级)</option>
            <option value="3">突破3 (1~90级)</option>
            <option value="4">突破4 (1~120级)</option>
          </select>
        </div>
        <div class="control-item">
          <label>角色等级</label>
          <input type="number" id="levelInput" min="1" value="1">
          <span id="levelRange" class="range-hint">1 ~ 30</span>
        </div>
      </div>
      <div class="modal-buttons">
        <button id="closeLevelBtn" class="btn-glass">关闭</button>
      </div>
    </div>
  </div>

  <!-- 被动配置浮窗 -->
  <div id="modal-passive" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>📘 被动技能</h3>
      <div id="passiveContainer"></div>
      <div class="modal-buttons">
        <button id="closePassiveBtn" class="btn-glass">关闭</button>
      </div>
    </div>
  </div>

  <!-- 觉醒配置浮窗 -->
  <div id="modal-awake" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>✨ 觉醒技能</h3>
      <div id="awakeCardsContainer" class="awake-cards"></div>
      <div class="modal-buttons">
        <button id="closeAwakeBtn" class="btn-glass">关闭</button>
      </div>
    </div>
  </div>

  <!-- 徽章配置浮窗 -->
  <div id="modal-badge" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content badge-modal">
      <h3>🎖️ 徽章配置</h3>
      <div class="badge-section">
        <h4>套装选择</h4>
        <div id="suitGrid" class="suit-grid"></div>
      </div>
      <div id="partsContainer" class="parts-area"></div>
      <div class="modal-buttons">
        <button id="closeBadgeBtn" class="btn-glass">关闭</button>
      </div>
    </div>
  </div>

  <!-- 刻印配置浮窗 -->
  <div id="modal-seal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content seal-modal">
      <div class="seal-layout">
        <div class="seal-prof-sidebar" id="sealProfSidebar">
          <div class="seal-prof-btn active" data-prof="坚甲">
            <img src="./assets/seal/01坚甲_ExploreDevelop_fui_atlas0.png.png" alt="坚甲">
          </div>
          <div class="seal-prof-btn" data-prof="异刃">
            <img src="./assets/seal/02异刃_ExploreDevelop_fui_atlas0.png.png" alt="异刃">
          </div>
          <div class="seal-prof-btn" data-prof="言灵">
            <img src="./assets/seal/03言灵_ExploreDevelop_fui_atlas0.png.png" alt="言灵">
          </div>
          <div class="seal-prof-btn" data-prof="猎影">
            <img src="./assets/seal/04猎影_ExploreDevelop_fui_atlas0.png.png" alt="猎影">
          </div>
        </div>
        <div class="seal-main" id="sealMain"></div>
        <div class="seal-edit-panel" id="sealEditPanel">
          <div class="seal-edit-header">
            <span class="seal-edit-title" id="sealEditTitle">调整等级</span>
            <button class="seal-edit-close" id="sealEditClose">×</button>
          </div>
          <div class="seal-edit-body" id="sealEditBody"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 事迹星级 -->
  <div id="modal-deed" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>📜 事迹星级</h3>
      <div class="controls">
        <div class="control-item">
          <label>星级数（0 ~ 999）</label>
          <input type="number" id="deedStarInput" min="0" max="999" value="0">
        </div>
      </div>
      <div id="deedPreview" style="margin-top:12px; font-size:14px; color:#ccc;">攻击 +0　防御 +0　生命 +0</div>
      <div class="modal-buttons">
        <button id="closeDeedBtn" class="btn-glass">关闭</button>
      </div>
    </div>
  </div>

  <!-- 角色选择弹窗 -->
  <div id="pickerModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content picker-modal">
      <h3>选择角色</h3>
      <div class="filter-bar">
        <span class="filter-label">筛选：</span>
        <div id="filterStars" class="filter-group"></div>
        <div id="filterProfs" class="filter-group"></div>
        <div id="filterElems" class="filter-group"></div>
        <button id="clearFilterBtn" class="btn-glass btn-small">清除筛选</button>
      </div>
      <div id="charGrid" class="char-grid"></div>
      <div class="modal-buttons">
        <button id="confirmPickBtn" class="btn-glass">确定</button>
        <button id="cancelPickBtn" class="btn-glass">取消</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
